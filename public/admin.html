<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andeck · Quản trị</title>
<link rel="icon" type="image/png" href="/img/andeck-icon.png">
<link rel="apple-touch-icon" href="/img/andeck-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--bg2:#181b23;--bg3:#1e222d;--bg4:#262b38;--border:#2a2f3d;--border2:#353b4d;--text:#e4e6ed;--text2:#9ca0af;--text3:#6b7084;--red:#e74c3c;--gold:#C4A882;--gold2:#a8895c;--green:#2ecc71;--wrong:#e74c3c;--blue:#4da6e8;--orange:#e67e22;--blue-bg:rgba(77,166,232,.08);--blue-border:rgba(77,166,232,.15)}
*{box-sizing:border-box;margin:0;padding:0;scrollbar-width:thin;scrollbar-color:#353b4d transparent}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#353b4d;border-radius:3px}
body{font-family:'Be Vietnam Pro',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

.login-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500}
.login-wrap.hidden{display:none}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:40px 36px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-box h1{font-size:28px;color:var(--gold);margin-bottom:4px;font-weight:700}
.login-box .sub{color:var(--text3);font-size:12px;margin-bottom:28px}
.login-box .field{margin-bottom:14px;text-align:left}
.login-box .field label{font-size:9px;font-weight:700;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px;display:block}
.login-box .field input{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:6px;background:var(--bg3);color:var(--text);font-size:14px;font-family:'Be Vietnam Pro',sans-serif;outline:none}
.login-box .field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(196,168,130,.1)}
.login-box .btn-login{width:100%;padding:12px;background:var(--gold2);color:#000;border:none;border-radius:6px;font-family:'Be Vietnam Pro',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px}
.login-box .btn-login:hover{background:var(--gold)}
.login-err{background:rgba(231,76,60,.1);color:var(--wrong);border:1px solid rgba(231,76,60,.2);border-radius:4px;padding:8px 12px;font-size:11px;margin-bottom:12px;display:none}

.header{background:var(--bg2);color:var(--text);padding:0 24px;height:44px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.header-logo{font-size:17px;font-weight:700;letter-spacing:1px;color:var(--gold)}
.header-logo span{color:var(--text3);font-size:11px;font-weight:400;margin-left:8px}
.header-right{display:flex;align-items:center;gap:12px}
.admin-name{font-size:11px;color:var(--text2)}
.btn-logout{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:4px;padding:5px 12px;font-size:10px;font-weight:600;cursor:pointer;font-family:'Be Vietnam Pro',sans-serif}
.btn-logout:hover{color:var(--wrong);border-color:var(--wrong)}

.main{height:calc(100vh - 44px);overflow:hidden;display:grid;grid-template-columns:260px 1fr}
.left-panel{padding:14px;overflow-y:auto;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
.right-panel{display:flex;flex-direction:column;height:100%;overflow:hidden;min-width:0}
.panel-head{padding:12px 16px 0;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg2)}
.panel-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;padding-bottom:10px}
.panel-head-title{font-size:15px;color:var(--text);font-weight:600;margin:0;flex-shrink:0}
.panel-toolbar-actions{display:flex;align-items:center;gap:8px;flex:1;justify-content:flex-end;min-width:0}
.panel-search{flex:1;min-width:0;max-width:280px;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text);font-size:13px;outline:none;font-family:inherit}
.panel-search:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(196,168,130,.12)}
.panel-search::placeholder{color:var(--text3)}

.nav-tabs{display:flex;align-items:center;gap:4px;padding:0 0 10px;flex-wrap:wrap}
.nav-tab{background:none;border:none;padding:6px 2px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;font-family:inherit;transition:color .15s;white-space:nowrap}
.nav-tab:hover{color:var(--text2)}
.nav-tab.active{color:var(--gold);font-weight:700}
.nav-tab.nav-tab--pending.active{color:var(--orange)}
.nav-tab.nav-tab--done.active{color:var(--green)}
.nav-tab-sep{color:var(--border2);font-size:11px;user-select:none;padding:0 2px}
.nav-tab-count{display:inline-block;margin-left:4px;font-size:10px;font-weight:700;padding:1px 6px;border-radius:999px;background:rgba(230,126,34,.18);color:var(--orange);vertical-align:middle}

.panel-scroll{flex:1;overflow-y:auto;padding:0 16px 16px;-webkit-overflow-scrolling:touch}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.card-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.card-toggle{font-size:9px;color:var(--blue);cursor:pointer;font-weight:600}
.card-toggle:hover{text-decoration:underline}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.stat-item{text-align:center;padding:8px 3px;background:var(--bg3);border-radius:5px}
.stat-num{font-size:20px;color:var(--text);line-height:1;font-weight:700}
.stat-label{font-size:7px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.stat-change{font-size:9px;font-weight:700;margin-top:1px}
.stat-change.up{color:var(--green)}
.stat-change.down{color:var(--wrong)}

.detail-stats{display:none;margin-top:10px}
.detail-stats.show{display:block}
.ds-row{display:flex;justify-content:space-between;padding:5px 0;font-size:11px;border-bottom:1px solid var(--border)}
.ds-row:last-child{border-bottom:none}
.ds-label{color:var(--text2)}
.ds-val{font-weight:700;color:var(--text)}
.ds-section{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:8px 0 4px;font-weight:700}

.chart-bar-group{display:flex;align-items:flex-end;justify-content:space-around;height:80px;border-bottom:1px solid var(--border)}
.chart-col{display:flex;flex-direction:column;align-items:center;flex:1}
.chart-bar{width:18px;border-radius:3px 3px 0 0;transition:height .4s;cursor:pointer;position:relative}
.chart-bar:hover{opacity:.8}
.chart-bar .tip{display:none;position:absolute;bottom:calc(100% + 3px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:8px;padding:2px 5px;border-radius:2px;white-space:nowrap;z-index:5}
.chart-bar:hover .tip{display:block}
.chart-lbl{font-size:7px;color:var(--text3);margin-top:2px}

table{width:100%;border-collapse:collapse}
.tbl{background:var(--bg2);border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.tbl thead th{background:var(--bg4);color:var(--text2);padding:8px 9px;text-align:left;font-size:9px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;position:sticky;top:0;z-index:2}
.tbl tbody td{padding:7px 9px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text)}
.tbl tbody tr:hover{background:rgba(255,255,255,.02)}

.badge{display:inline-block;padding:2px 6px;border-radius:8px;font-size:8px;font-weight:700}
.badge-admin{background:rgba(196,168,130,.12);color:var(--gold)}

.btn{padding:7px 13px;border:none;border-radius:4px;font-family:'Be Vietnam Pro',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--gold2);color:#000}.btn-primary:hover{background:var(--gold)}
.btn-sm{padding:4px 8px;font-size:9px;border-radius:3px}
.btn-danger{background:rgba(231,76,60,.15);color:var(--red);border:1px solid rgba(231,76,60,.2)}.btn-danger:hover{background:rgba(231,76,60,.25)}
.btn-gold{background:rgba(196,168,130,.12);color:var(--gold);border:1px solid rgba(196,168,130,.2)}.btn-gold:hover{background:rgba(196,168,130,.2)}
.btn-outline{background:transparent;color:var(--text3);border:1px solid var(--border2)}.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.actions{display:flex;gap:3px}
.empty-row{text-align:center;padding:24px 8px !important;color:var(--text3);font-size:11px}

.m-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center}
.m-ov.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:24px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.4);position:relative}
.modal h3{font-size:15px;color:var(--text);margin-bottom:14px;font-weight:600}
.m-close{position:absolute;top:8px;right:10px;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3)}.m-close:hover{color:var(--text)}
.field{margin-bottom:10px;text-align:left}
.field label{font-size:9px;font-weight:700;color:var(--text2);letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px;display:block}
.field input,.field select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:4px;background:var(--bg3);color:var(--text);font-family:'Be Vietnam Pro',sans-serif;font-size:12px;outline:none}
.field input:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(196,168,130,.08)}
.field-note{font-size:9px;color:var(--text3);margin-top:2px}
.alert{padding:7px 10px;border-radius:4px;font-size:10px;margin-bottom:8px;display:none}
.alert.ok{display:block;background:rgba(46,204,113,.08);color:var(--green);border:1px solid rgba(46,204,113,.15)}
.alert.err{display:block;background:rgba(231,76,60,.06);color:var(--wrong);border:1px solid rgba(231,76,60,.12)}

.side-panel{position:fixed;right:0;top:0;height:100%;width:320px;z-index:999;background:var(--bg2);border-left:1px solid var(--border);display:none;flex-direction:column;box-shadow:-8px 0 24px rgba(0,0,0,.35);overflow:hidden}
.side-panel.sp-open{display:flex}
.sp-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px}
.sp-email{font-size:13px;font-weight:600;color:var(--gold);word-break:break-all;flex:1;min-width:0}
.sp-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);padding:2px 6px;border-radius:4px;flex-shrink:0}
.sp-close:hover{color:var(--text);background:rgba(255,255,255,.05)}
.sp-body{flex:1;overflow-y:auto;padding:12px 16px 16px;display:flex;flex-direction:column;gap:12px}
.sp-section{border:1px solid var(--border);border-radius:8px;padding:12px;background:var(--bg3)}
.sp-section-title{font-size:9px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.sp-quota-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sp-quota-row .field{margin-bottom:0}
.sp-deck-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto}
.sp-deck-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;background:var(--bg2);border-radius:5px;border:1px solid var(--border);font-size:11px}
.sp-deck-info{flex:1;min-width:0}
.sp-deck-name{font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp-deck-meta{font-size:9px;color:var(--text3);margin-top:2px}
.sp-empty{font-size:10px;color:var(--text3);text-align:center;padding:8px 0}

.badge-pending{background:rgba(230,126,34,.12);color:var(--orange)}
.badge-applied{background:rgba(46,204,113,.12);color:var(--green)}
.badge-refunded{background:rgba(149,165,166,.15);color:#95a5a6}

.panel-view{display:none;flex-direction:column;height:100%;overflow:hidden;min-height:0}
.panel-view.active{display:flex}

.order-list{display:flex;flex-direction:column;gap:10px;padding:12px 0}
.order-empty{text-align:center;padding:32px 16px;color:var(--text3);font-size:12px;background:var(--bg2);border:1px dashed var(--border);border-radius:10px}
.order-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.order-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.order-code{font-weight:700;color:var(--gold);font-size:14px;line-height:1.3;word-break:break-all}
.order-card-meta{display:grid;gap:4px;font-size:12px;color:var(--text2)}
.order-card-meta strong{color:var(--text);font-weight:600}
.order-card-date{font-size:10px;color:var(--text3)}
.order-card-actions{margin-top:2px}
.btn-action{width:100%;min-height:44px;font-size:13px;padding:10px 14px;border-radius:8px}

.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}

.card--chart .chart-bar-group{height:72px}

@media(max-width:900px){
  .main{
    grid-template-columns:1fr;
    grid-template-rows:auto 1fr;
    height:calc(100vh - 44px);
    height:calc(100dvh - 44px);
  }
  .left-panel{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    padding:10px 12px;
    border-right:none;
    border-bottom:1px solid var(--border);
    overflow:visible;
    flex-shrink:0;
  }
  .card--chart{grid-column:1/-1}
  .card--chart .chart-bar-group{height:64px}
  .stat-num{font-size:18px}
  .panel-head{padding:10px 12px 0}
  .panel-toolbar{flex-wrap:nowrap;padding-bottom:8px}
  .panel-head-title{font-size:14px;display:none}
  .panel-search{max-width:none;flex:1;font-size:14px;min-height:40px}
  .panel-toolbar-actions{width:100%}
  .btn-sm#btnAddUser{min-height:40px;padding:8px 12px;flex-shrink:0}
  .panel-scroll{padding:0 12px 16px}
  .header{padding:0 12px}
  .login-box{width:calc(100vw - 32px);max-width:360px;padding:32px 24px}
  .tbl thead th,.tbl tbody td{padding:10px 8px;font-size:10px}
  .btn-sm{min-height:36px;padding:6px 10px;font-size:10px}
  .nav-tab{font-size:14px;padding:8px 4px}
}
@media(max-width:600px){
  .modal{width:calc(100vw - 20px);padding:20px 16px}
  .side-panel{width:100%}
  .admin-name{display:none}
  .left-panel{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>Andeck</h1>
    <div class="sub">Đăng nhập quản trị viên</div>
    <div class="login-err" id="logErr"></div>
    <div class="field"><label>Tài khoản</label><input type="text" id="logU" placeholder="admin1" autofocus></div>
    <div class="field"><label>Mật khẩu</label><input type="password" id="logP" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-login" onclick="doLogin()">Đăng nhập</button>
  </div>
</div>

<div id="appWrap" style="display:none;height:100vh;flex-direction:column">
<div class="header">
  <div class="header-logo">Andeck<span>Quản trị</span></div>
  <div class="header-right"><span class="admin-name" id="adminName"></span><button class="btn-logout" onclick="doLogout()">Đăng xuất</button></div>
</div>
<div class="main">
  <div class="left-panel">
    <div class="card">
      <div class="card-title">Tổng quan <span class="card-toggle" id="detToggle" onclick="toggleDetail()">Xem chi tiết ▼</span></div>
      <div class="stat-grid">
        <div class="stat-item"><div class="stat-num" id="s-tot">0</div><div class="stat-label">Tổng TK user</div></div>
        <div class="stat-item"><div class="stat-num" id="s-mo">0</div><div class="stat-label">Tháng này</div><div class="stat-change" id="s-mc"></div></div>
      </div>
      <div class="detail-stats" id="detPanel">
        <div class="ds-section">So sánh tháng</div>
        <div id="ds-compare"></div>
      </div>
    </div>
    <div class="card card--chart"><div class="card-title">TK mới theo tháng</div><div class="chart-bar-group" id="chart"></div></div>
  </div>
  <div class="right-panel">
    <div class="panel-head">
      <div class="panel-toolbar">
        <h2 class="panel-head-title" id="panelTitle">Danh sách tài khoản</h2>
        <div class="panel-toolbar-actions">
          <input type="search" id="srch" class="panel-search" placeholder="Tìm email..." oninput="onSearch()" autocomplete="off">
          <button type="button" class="btn btn-primary btn-sm" id="btnAddUser" onclick="openAdd()" title="Thêm tài khoản">+ Thêm</button>
        </div>
      </div>
      <nav class="nav-tabs" aria-label="Phân loại">
        <button type="button" class="nav-tab active" id="tabUsers" onclick="switchTab('users')">Tài khoản</button>
        <span class="nav-tab-sep" aria-hidden="true">·</span>
        <button type="button" class="nav-tab nav-tab--pending" id="tabPending" onclick="switchTab('pending')">Chờ xử lý<span class="nav-tab-count" id="pendingCount" hidden></span></button>
        <span class="nav-tab-sep" aria-hidden="true">·</span>
        <button type="button" class="nav-tab nav-tab--done" id="tabDone" onclick="switchTab('done')">Đã xử lý</button>
      </nav>
    </div>
    <div id="viewUsers" class="panel-view active">
    <div id="da" class="alert" style="margin:0 16px"></div>
    <div class="panel-scroll tbl-scroll">
      <table class="tbl">
        <thead><tr><th>#</th><th>Email / Zalo</th><th>Quota</th><th>Ngày tạo</th><th>Thao tác</th></tr></thead>
        <tbody id="utb"></tbody>
      </table>
    </div>
    </div>
    <div id="viewPending" class="panel-view">
    <div id="oa-pending" class="alert" style="margin:0 16px"></div>
    <div class="panel-scroll">
      <div id="orderListPending" class="order-list"></div>
    </div>
    </div>
    <div id="viewDone" class="panel-view">
    <div id="oa-done" class="alert" style="margin:0 16px"></div>
    <div class="panel-scroll">
      <div id="orderListDone" class="order-list"></div>
    </div>
    </div>
  </div>
</div>
</div>

<div class="m-ov" id="m-add"><div class="modal"><button class="m-close" onclick="cm('m-add')">&times;</button><h3>Thêm tài khoản</h3><div id="a-al" class="alert"></div>
  <div class="field"><label>Email</label><input type="email" id="a-em" placeholder="vd: user@gmail.com"></div>
  <div class="field"><label>Mật khẩu</label><input type="text" id="a-pw" placeholder="vd: 123456"></div>
  <div class="field"><label>Zalo (tuỳ chọn)</label><input type="text" id="a-zalo" placeholder="vd: 0901234567"></div>
  <div class="sp-quota-row">
    <div class="field"><label>Giới hạn deck</label><input type="number" id="a-dq" min="0" value="3"></div>
    <div class="field"><label>Từ / deck</label><input type="number" id="a-wq" min="0" value="50"></div>
  </div>
  <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="doAdd()">Tạo tài khoản</button>
</div></div>

<div class="m-ov" id="m-rst"><div class="modal"><button class="m-close" onclick="cm('m-rst')">&times;</button><h3>Đặt lại mật khẩu</h3><p style="font-size:11px;color:var(--text3);margin-bottom:10px">TK: <strong id="r-em" style="color:var(--text)"></strong></p><div id="r-al" class="alert"></div>
  <div class="field"><label>Mật khẩu mới</label><input type="text" id="r-pw" placeholder="MK mới"></div>
  <button class="btn btn-primary" style="width:100%" onclick="doRst()">Cập nhật</button>
</div></div>

<div id="side-panel" class="side-panel">
  <div class="sp-head">
    <span class="sp-email" id="sp-email"></span>
    <button type="button" class="sp-close" onclick="closeSp()" title="Đóng">&times;</button>
  </div>
  <div class="sp-body">
    <div id="sp-al" class="alert"></div>

    <div class="sp-section">
      <div class="sp-section-title">Đổi mật khẩu</div>
      <div class="field"><label>Mật khẩu mới</label><input type="text" id="sp-pw" placeholder="MK mới"></div>
      <button class="btn btn-gold" style="width:100%" onclick="doRstSp()">Đổi MK</button>
    </div>

    <div class="sp-section">
      <div class="sp-section-title">Deck quota</div>
      <div class="sp-quota-row">
        <div class="field"><label>Deck hiện có</label><input type="number" id="input-deck-count" readonly tabindex="-1"></div>
        <div class="field"><label>Giới hạn deck</label><input type="number" id="input-deck-quota" min="0"></div>
      </div>
      <div class="field" style="margin-top:8px"><label>Từ / deck</label><input type="number" id="input-word-quota" min="0"></div>
      <button class="btn btn-primary" style="width:100%" onclick="saveQuotaSp()">Lưu quota</button>
    </div>

    <div class="sp-section">
      <div class="sp-section-title">Danh sách deck</div>
      <div class="sp-deck-list" id="sp-deck-list"><div class="sp-empty">Chưa tải</div></div>
    </div>

    <div class="sp-section">
      <button type="button" class="btn btn-danger" style="width:100%" onclick="dUFromSp()">Xóa tài khoản</button>
    </div>
  </div>
</div>

<script>
var TOKEN=null,API=window.location.origin,US=[],PENDING_ORDERS=[],DONE_ORDERS=[],activeTab='users';

async function ap(m,p,b){var o={method:m,headers:{'Content-Type':'application/json'}};if(TOKEN)o.headers['Authorization']='Bearer '+TOKEN;if(b)o.body=JSON.stringify(b);try{var r=await fetch(API+p,o);var d=await r.json();return{ok:r.ok,data:d};}catch(e){return{ok:false,data:{error:'Không kết nối được server'}};}}

async function doLogin(){
  var u=document.getElementById('logU').value.trim(),p=document.getElementById('logP').value.trim();
  if(!u||!p){document.getElementById('logErr').style.display='block';document.getElementById('logErr').textContent='Nhập đầy đủ';return;}
  var r=await ap('POST','/api/login',{username:u,password:p});
  if(!r.ok||r.data.role!=='admin'){
    document.getElementById('logErr').style.display='block';
    document.getElementById('logErr').textContent=r.data.error||'Không có quyền admin';
    return;
  }
  TOKEN=r.data.token;
  localStorage.setItem('andeck_token', TOKEN);
  document.getElementById('loginWrap').classList.add('hidden');
  document.getElementById('appWrap').style.display='flex';
  document.getElementById('adminName').textContent=u;
  await loadAll();
}

function doLogout(){
  TOKEN=null;
  localStorage.removeItem('andeck_token');
  US=[];
  document.getElementById('loginWrap').classList.remove('hidden');
  document.getElementById('appWrap').style.display='none';
  document.getElementById('logU').value='';
  document.getElementById('logP').value='';
  document.getElementById('logErr').style.display='none';
}

async function loadAll(){
  var r=await ap('GET','/api/admin/users');
  if(r.ok)US=r.data;
  rSt();rCh();
  await Promise.all([loadPendingOrders(true),loadDoneOrders(true)]);
  refreshCurrentView();
}

function getSearchQuery(){
  return ((document.getElementById('srch')||{}).value||'').trim().toLowerCase();
}

function onSearch(){
  refreshCurrentView();
}

function refreshCurrentView(){
  if(activeTab==='users')rTbl();
  else if(activeTab==='pending')renderOrderCards('orderListPending',filterOrders(PENDING_ORDERS),'pending');
  else if(activeTab==='done')renderOrderCards('orderListDone',filterOrders(DONE_ORDERS),'done');
}

function filterOrders(list){
  var sq=getSearchQuery();
  if(!sq)return list;
  return list.filter(function(o){return(o.email||'').toLowerCase().includes(sq);});
}

function updatePendingBadge(){
  var el=document.getElementById('pendingCount');
  if(!el)return;
  var n=PENDING_ORDERS.length;
  if(n>0){el.textContent=n;el.hidden=false;}
  else el.hidden=true;
}

function uo(){return US.filter(function(u){return u.role!=='admin';});}
function ym(d){return d?d.slice(0,7):'';}
function yl(k){return'T'+parseInt(k.split('-')[1])+'/'+k.split('-')[0].slice(2);}
function nYM(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function pYM(){var d=new Date();d.setMonth(d.getMonth()-1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}

function R(){rTbl();rSt();rCh();}

function rTbl(){
  var tb=document.getElementById('utb');
  var sq=getSearchQuery();
  var USF=sq?US.filter(function(u){return u.email.toLowerCase().includes(sq);}):US.slice();
  USF=USF.sort(function(a,b){return(b.createdAt||'').localeCompare(a.createdAt||'');});
  if(!USF.length){tb.innerHTML='<tr><td colspan="5" class="empty-row">'+(sq?'Không tìm thấy':'Chưa có')+'</td></tr>';return;}
  tb.innerHTML=USF.map(function(u,i){
    var isAdmin=u.role==='admin';
    var nm=u.email+(u.zalo?' <span style="color:var(--text3);font-size:9px">· '+escH(u.zalo)+'</span>':'')+(isAdmin?' <span class="badge badge-admin">Admin</span>':'');
    var quota=(u.deckQuota??3)+' deck · '+(u.totalWordQuota!=null?u.totalWordQuota:(u.deckQuota??3)*(u.wordQuota??50))+' từ';
    var em=encodeURIComponent(u.email);
    var acts='';
    if(!isAdmin){acts='<button class="btn btn-sm btn-outline" onclick="openSp(\''+em+'\')">Chi tiết</button><button class="btn btn-sm btn-danger" onclick="dU(\''+em+'\')">Xóa</button>';}
    return'<tr><td style="color:var(--text3);font-size:10px">'+(i+1)+'</td><td style="font-size:11px">'+nm+'</td><td style="font-size:10px;color:var(--text2)">'+quota+'</td><td style="color:var(--text3);font-size:10px">'+(u.createdAt?String(u.createdAt).slice(0,10):'')+'</td><td><div class="actions">'+acts+'</div></td></tr>';
  }).join('');
}

function rSt(){
  var u=uo(),tm=nYM(),pm=pYM();
  var tmu=u.filter(function(x){return ym(x.createdAt)===tm;});
  var pmu=u.filter(function(x){return ym(x.createdAt)===pm;});
  document.getElementById('s-tot').textContent=u.length;
  document.getElementById('s-mo').textContent=tmu.length;
  pchg('s-mc',tmu.length,pmu.length);
  var comp='<div class="ds-row"><span class="ds-label">Tháng này</span><span class="ds-val">'+tmu.length+' TK</span></div><div class="ds-row"><span class="ds-label">Tháng trước</span><span class="ds-val">'+pmu.length+' TK</span></div>';
  document.getElementById('ds-compare').innerHTML=comp;
}

function pchg(id,c,p){var e=document.getElementById(id);if(!p){e.textContent=c>0?'Mới':'';e.className='stat-change up';return;}var v=Math.round((c-p)/p*100);e.textContent=(v>0?'+':'')+v+'%';e.className='stat-change '+(v>=0?'up':'down');}

var detOpen=false;
function toggleDetail(){detOpen=!detOpen;document.getElementById('detPanel').classList.toggle('show',detOpen);document.getElementById('detToggle').textContent=detOpen?'Ẩn chi tiết ▲':'Xem chi tiết ▼';}

function rCh(){
  var mm={},u=uo();
  u.forEach(function(x){var m=ym(x.createdAt);if(m)mm[m]=(mm[m]||0)+1;});
  var now=new Date(),ms=[];
  for(var i=5;i>=0;i--){var d=new Date(now.getFullYear(),now.getMonth()-i,1);var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');ms.push({k:k,l:yl(k),c:mm[k]||0});}
  var mx=Math.max.apply(null,ms.map(function(m){return m.c;}));if(!mx)mx=1;
  document.getElementById('chart').innerHTML=ms.map(function(m){var h=Math.max(3,(m.c/mx)*70);return'<div class="chart-col"><div class="chart-bar" style="height:'+h+'px;background:'+(m.c?'var(--gold)':'var(--bg4)')+'"><span class="tip">'+m.c+'</span></div><span class="chart-lbl">'+m.l+'</span></div>';}).join('');
}

function openAdd(){
  document.getElementById('a-em').value='';
  document.getElementById('a-pw').value='';
  document.getElementById('a-zalo').value='';
  document.getElementById('a-dq').value='3';
  document.getElementById('a-wq').value='50';
  document.getElementById('a-al').className='alert';
  document.getElementById('m-add').classList.add('show');
}

async function doAdd(){
  var em=document.getElementById('a-em').value.trim(),pw=document.getElementById('a-pw').value.trim(),zl=document.getElementById('a-zalo').value.trim(),al=document.getElementById('a-al');
  var dq=parseInt(document.getElementById('a-dq').value,10),wq=parseInt(document.getElementById('a-wq').value,10);
  if(!em||!em.includes('@')){al.className='alert err';al.textContent='Email không hợp lệ';return;}
  if(!pw||pw.length<4){al.className='alert err';al.textContent='MK tối thiểu 4 ký tự';return;}
  var r=await ap('POST','/api/admin/users',{email:em,password:pw,zalo:zl,deckQuota:isNaN(dq)?3:dq,wordQuota:isNaN(wq)?50:wq});
  if(!r.ok){al.className='alert err';al.textContent=r.data.error;return;}
  al.className='alert ok';al.textContent=r.data.message;
  setTimeout(async function(){cm('m-add');await loadAll();},1200);
}

function oRst(em){em=decodeURIComponent(em);document.getElementById('r-em').textContent=em;document.getElementById('r-pw').value='';document.getElementById('r-al').className='alert';document.getElementById('m-rst').classList.add('show');}
async function doRst(){
  var em=document.getElementById('r-em').textContent,pw=document.getElementById('r-pw').value.trim(),al=document.getElementById('r-al');
  if(!pw||pw.length<4){al.className='alert err';al.textContent='MK tối thiểu 4 ký tự';return;}
  var r=await ap('PUT','/api/admin/users/'+encodeURIComponent(em)+'/reset-password',{newPassword:pw});
  if(!r.ok){al.className='alert err';al.textContent=r.data.error;return;}
  al.className='alert ok';al.textContent='Đã đặt lại! MK mới: '+pw;
  setTimeout(function(){cm('m-rst');},1200);
}

async function dU(em){
  em=decodeURIComponent(em);
  if(!confirm('Xóa "'+em+'"?'))return;
  var r=await ap('DELETE','/api/admin/users/'+encodeURIComponent(em));
  if(!r.ok){showA('da',r.data.error,'err');return;}
  showA('da',r.data.message,'ok');
  closeSp();
  await loadAll();
}

var spEmail=null;
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showSpA(msg,t){var al=document.getElementById('sp-al');al.className='alert '+t;al.textContent=msg;al.style.display='block';setTimeout(function(){if(al.className.indexOf('ok')!==-1||al.className.indexOf('err')!==-1)al.style.display='';},3000);}
function closeSp(){document.getElementById('side-panel').classList.remove('sp-open');spEmail=null;}

function setSpDeckCount(n){document.getElementById('input-deck-count').value=n!=null?n:0;}
function setSpQuota(u){
  if(!u){document.getElementById('input-deck-quota').value='';document.getElementById('input-word-quota').value='';setSpDeckCount(0);return;}
  document.getElementById('input-deck-quota').value=u.deckQuota??3;
  document.getElementById('input-word-quota').value=u.wordQuota??50;
}

async function openSp(emEnc){
  var em=decodeURIComponent(emEnc);
  spEmail=em;
  document.getElementById('sp-email').textContent=em;
  document.getElementById('sp-al').className='alert';
  document.getElementById('sp-al').style.display='none';
  document.getElementById('sp-pw').value='';
  var r=await ap('GET','/api/admin/users');
  if(r.ok)US=r.data;
  var u=US.find(function(x){return x.email===em;});
  if(!u){showSpA('Không tìm thấy user','err');return;}
  setSpQuota(u);
  loadSpDecks(em);
  document.getElementById('side-panel').classList.add('sp-open');
}

async function loadSpDecks(em){
  var list=document.getElementById('sp-deck-list');
  list.innerHTML='<div class="sp-empty">Đang tải...</div>';
  setSpDeckCount('');
  var r=await ap('GET','/api/admin/users/'+encodeURIComponent(em)+'/decks');
  if(!r.ok){list.innerHTML='<div class="sp-empty">Lỗi tải danh sách</div>';setSpDeckCount(0);return;}
  var decks=r.data||[];
  setSpDeckCount(decks.length);
  if(!decks.length){list.innerHTML='<div class="sp-empty">Chưa có deck</div>';return;}
  list.innerHTML=decks.map(function(d){
    var did=encodeURIComponent(d.deckId);
    return'<div class="sp-deck-item"><div class="sp-deck-info"><div class="sp-deck-name">'+escH(d.name)+'</div><div class="sp-deck-meta">'+escH(d.langPair||'')+' · '+d.wordCount+' từ</div></div><button type="button" class="btn btn-sm btn-danger" onclick="delDeck(\''+did+'\')">Xóa</button></div>';
  }).join('');
}

async function delDeck(didEnc){
  var did=decodeURIComponent(didEnc);
  if(!confirm('Xóa deck này?'))return;
  var r=await ap('DELETE','/api/admin/decks/'+encodeURIComponent(did));
  if(!r.ok){showSpA(r.data.error||'Lỗi xóa','err');return;}
  showSpA('Đã xóa deck','ok');
  if(spEmail)loadSpDecks(spEmail);
}

async function saveQuotaSp(){
  if(!spEmail)return;
  var dq=parseInt(document.getElementById('input-deck-quota').value,10);
  var wq=parseInt(document.getElementById('input-word-quota').value,10);
  if(isNaN(dq)||isNaN(wq)){showSpA('Nhập số hợp lệ','err');return;}
  var r=await ap('PUT','/api/admin/users/'+encodeURIComponent(spEmail)+'/quota',{deckQuota:dq,wordQuota:wq});
  if(!r.ok){showSpA(r.data.error||'Lỗi lưu','err');return;}
  showSpA('Đã lưu quota','ok');
  await loadAll();
  var u=US.find(function(x){return x.email===spEmail;});
  if(u){u.deckQuota=dq;u.wordQuota=wq;setSpQuota(u);}
}

async function doRstSp(){
  if(!spEmail)return;
  var pw=document.getElementById('sp-pw').value.trim();
  if(!pw||pw.length<4){showSpA('MK tối thiểu 4 ký tự','err');return;}
  var r=await ap('PUT','/api/admin/users/'+encodeURIComponent(spEmail)+'/reset-password',{newPassword:pw});
  if(!r.ok){showSpA(r.data.error||'Lỗi','err');return;}
  showSpA('Đã đặt lại! MK mới: '+pw,'ok');
  document.getElementById('sp-pw').value='';
}

function dUFromSp(){if(!spEmail)return;dU(encodeURIComponent(spEmail));}

function switchTab(tab){
  activeTab=tab;
  document.getElementById('tabUsers').classList.toggle('active',tab==='users');
  document.getElementById('tabPending').classList.toggle('active',tab==='pending');
  document.getElementById('tabDone').classList.toggle('active',tab==='done');
  document.getElementById('viewUsers').classList.toggle('active',tab==='users');
  document.getElementById('viewPending').classList.toggle('active',tab==='pending');
  document.getElementById('viewDone').classList.toggle('active',tab==='done');
  var titles={users:'Danh sách tài khoản',pending:'Đơn chờ xử lý',done:'Đơn đã xử lý'};
  document.getElementById('panelTitle').textContent=titles[tab]||'';
  var ph={users:'Tìm email tài khoản...',pending:'Tìm email đơn chờ...',done:'Tìm email đơn đã xử lý...'};
  document.getElementById('srch').placeholder=ph[tab]||'Tìm email...';
  if(tab==='pending'&&!PENDING_ORDERS.length)loadPendingOrders();
  else if(tab==='done'&&!DONE_ORDERS.length)loadDoneOrders();
  refreshCurrentView();
}

async function loadPendingOrders(silent){
  var r=await ap('GET','/api/admin/orders?status=pending');
  if(!r.ok){
    if(!silent)showA('oa-pending',r.data.error||'Lỗi tải đơn','err');
    return;
  }
  PENDING_ORDERS=r.data.orders||[];
  updatePendingBadge();
  if(activeTab==='pending')renderOrderCards('orderListPending',filterOrders(PENDING_ORDERS),'pending');
}

async function loadDoneOrders(silent){
  var r=await ap('GET','/api/admin/orders?status=processed');
  if(!r.ok){
    if(!silent)showA('oa-done',r.data.error||'Lỗi tải đơn','err');
    return;
  }
  DONE_ORDERS=r.data.orders||[];
  if(activeTab==='done')renderOrderCards('orderListDone',filterOrders(DONE_ORDERS),'done');
}

function fmtOrderDt(iso){
  if(!iso)return '—';
  return String(iso).slice(0,16).replace('T',' ');
}

function renderOrderCards(containerId,orders,mode){
  var el=document.getElementById(containerId);
  if(!el)return;
  var sq=getSearchQuery();
  if(!orders.length){
    var emptyMsg=mode==='pending'
      ?(sq?'Không có đơn chờ khớp email':'Không có đơn chờ xử lý')
      :(sq?'Không có đơn đã xử lý khớp email':'Chưa có đơn đã xử lý');
    el.innerHTML='<div class="order-empty">'+emptyMsg+'</div>';
    return;
  }
  el.innerHTML=orders.map(function(o){
    var dt=fmtOrderDt(o.createdAt);
    var price=escH(o.priceLabel||(o.amount!=null?o.amount.toLocaleString('vi-VN')+'đ':'—'));
    var oid=String(o.id);
    var badge,action='';
    if(mode==='pending'){
      badge='<span class="badge badge-pending">Chờ xử lý</span>';
      action='<button type="button" class="btn btn-primary btn-action" onclick="verifyOrder(\''+oid+'\')">Kích hoạt</button>';
    }else if(o.status==='applied'){
      badge='<span class="badge badge-applied">Đã kích hoạt</span>';
      action='<button type="button" class="btn btn-danger btn-action" onclick="refundOrder(\''+oid+'\')">Hoàn trả</button>';
    }else{
      badge='<span class="badge badge-refunded">Đã hoàn trả</span>';
      action='';
    }
    return '<article class="order-card">'+
      '<div class="order-card-head"><span class="order-code">'+escH(o.orderCode)+'</span>'+badge+'</div>'+
      '<div class="order-card-meta">'+
        '<div><strong>Email:</strong> '+escH(o.email)+'</div>'+
        '<div><strong>Gói:</strong> '+escH(o.packageName)+' · '+price+'</div>'+
        '<div class="order-card-date">'+dt+'</div>'+
      '</div>'+
      (action?'<div class="order-card-actions">'+action+'</div>':'')+
    '</article>';
  }).join('');
}

async function verifyOrder(id){
  var r=await ap('POST','/api/admin/orders/'+encodeURIComponent(id)+'/verify',{});
  if(!r.ok){showA('oa-pending',r.data.error||'Lỗi kích hoạt','err');return;}
  showA('oa-pending','Đã kích hoạt '+r.data.user.email,'ok');
  await loadAll();
}

async function refundOrder(id){
  var r=await ap('POST','/api/admin/orders/'+encodeURIComponent(id)+'/refund',{});
  if(!r.ok){showA('oa-done',r.data.error||'Lỗi hoàn trả','err');return;}
  showA('oa-done','Đã hoàn trả '+r.data.user.email,'ok');
  await loadAll();
}

function cm(id){document.getElementById(id).classList.remove('show');}
function showA(id,msg,t){var e=document.getElementById(id);e.className='alert '+t;e.textContent=msg;e.style.display='block';setTimeout(function(){e.style.display='none';},3000);}
document.querySelectorAll('.m-ov').forEach(function(el){el.addEventListener('click',function(e){if(e.target===el)el.classList.remove('show');});});

(async function(){
  var t=localStorage.getItem('andeck_token');
  if(!t)return;
  TOKEN=t;
  var r=await ap('GET','/api/admin/users');
  if(r.ok){
    document.getElementById('loginWrap').classList.add('hidden');
    document.getElementById('appWrap').style.display='flex';
    document.getElementById('adminName').textContent='Admin';
    await loadAll();
  }else{
    TOKEN=null;
    localStorage.removeItem('andeck_token');
  }
})();
</script>
</body>
</html>
